name: Section 11 Fitness Data Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Intervals.icu Sync
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python sync.py

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python upload_to_drive.py

      - name: Commit and Push local changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated data sync: ${{ github.event_name }}"
          file_pattern: 'data/*.json' # Adjust this if your data folder name is different
